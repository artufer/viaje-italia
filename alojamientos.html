<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alojamientos - Italia 2026</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 10px; margin: 0; box-sizing: border-box; }
        .main-container { background: #ffffff; padding: 20px; border-radius: 25px; width: 100%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); box-sizing: border-box; }
        h1 { font-size: 1.5rem; color: #2c3e50; text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        
        .btn-volver { display: block; text-align: center; margin-bottom: 20px; font-size: 0.8rem; color: #7f8c8d; text-decoration: none; border: 1px solid #ddd; padding: 8px 15px; border-radius: 20px; width: fit-content; margin-left: auto; margin-right: auto; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .btn-ciudad { padding: 12px 5px; background-color: #ffffff; border: 1px solid #ddd; border-radius: 12px; font-weight: 600; color: #555; text-decoration: none; cursor: pointer; text-align: center; font-size: 0.85rem; transition: background 0.3s; }
        .btn-ciudad.seleccionado { background-color: #ff9800; color: white; border-color: #ff9800; }
        
        .tarjeta { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .info-alo { font-weight: bold; font-size: 1.1rem; color: #2c3e50; margin-bottom: 5px; }
        .detalles { font-size: 0.9rem; color: #666; margin-bottom: 10px; }
        .acciones { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-accion { padding: 10px; border-radius: 8px; text-align: center; font-size: 0.8rem; text-decoration: none; color: white; font-weight: bold; flex: 1; min-width: 80px; }
    </style>
</head>
<body>

<div class="main-container">
    <a href="menu.html" class="btn-volver">⬅ VOLVER AL MENÚ</a>
    <h1>ALOJAMIENTOS</h1>
    
    <div class="btn-group">
        <button id="btn-Verona" class="btn-ciudad" onclick="filtrar('Verona')">Verona</button>
        <button id="btn-Florencia" class="btn-ciudad" onclick="filtrar('Florencia')">Florencia</button>
        <button id="btn-Rímini" class="btn-ciudad" onclick="filtrar('Rímini')">Rímini</button>
        <button id="btn-Roma" class="btn-ciudad" onclick="filtrar('Roma')">Roma</button>
    </div>

    <div id="info-alojamientos"></div>
</div>

<script>
    // Validación de acceso desde index.html[cite: 5]
    if (sessionStorage.getItem("accesoPermitido") !== "true") {
        window.location.href = "index.html";
    }

    const datosAlojamientos = {
        Verona: [
            { nombre: "Nuovo Hotel Rossi", direccion: "Via delle Coste, 2, 37138 Verona", botones: [
                { texto: "RESERVA", url: "h_verona.jpg", color: "#007aff" },
                { texto: "MAPA", url: "https://www.google.com/maps/place/Novo+Hotel+Rossi/@45.4293218,10.9749161,17z/data=!4m9!3m8!1s0x477f5f612c228a07:0xaf2beaec78ab4689!5m2!4m1!1i2!8m2!3d45.4293218!4d10.977491!16s%2Fg%2F1vxcv7yg?entry=ttu&g_ep=EgoyMDI2MDUyMC4wIKXMDSoASAFQAw%3D%3D", color: "#27ae60" }
            ]}
        ],
        Florencia: [
            { nombre: "Plus Florence", direccion: "Via Santa Caterina d'Alessandria, 15, 50129 Firenze", botones: [
                { texto: "RESERVA", url: "h_plus.jpg", color: "#007aff" },
                { texto: "MAPA", url: "https://www.google.com/maps/place/PLUS+Florence/@43.781652,11.2532631,17z/data=!3m1!5s0x132a541c2858c96b:0x15bb0c6e7b9798d4!4m10!3m9!1s0x132a541c27ae9a3b:0xe4f45d0f48882d6d!5m3!1s2026-05-28!4m1!1i2!8m2!3d43.781652!4d11.255838!16s%2Fg%2F1tk_rdjn?entry=ttu&g_ep=EgoyMDI2MDUyMC4wIKXMDSoASAFQAw%3D%3D", color: "#27ae60" }
            ]},
            { nombre: "Hostel Archi Rossi", direccion: "Via Faenza, 94R, 50123 Firenze", botones: [
                { texto: "RESERVA", url: "h_flo_2_1.jpg", color: "#007aff" },
                { texto: "HABITACIÓN", url: "h_flo_2_2.jpg", color: "#007aff" },
                { texto: "RECIBO", url: "h_flo_2_3.jpg", color: "#007aff" },
                { texto: "MAPA", url: "https://www.google.com/maps/place/Hostel+Archi+Rossi/@43.7782751,11.2460089,17z/data=!4m10!3m9!1s0x132a56a7e0de48ef:0x80a8cb33b0d85e74!5m3!1s2026-05-28!4m1!1i2!8m2!3d43.7782752!4d11.2508798!16s%2Fg%2F11xq4wc8w?entry=ttu&g_ep=EgoyMDI2MDUyMC4wIKXMDSoASAFQAw%3D%3D", color: "#27ae60" }
            ]}
        ],
        Rímini: [
            { nombre: "Hotel Giglio Miramare", direccion: "Viale Principe di Piemonte, 18, 47924 Rimini", botones: [
                { texto: "RESERVA", url: "h_rimini_1.jpg", color: "#007aff" },
                { texto: "RECIBO", url: "h_rimini_2.jpg", color: "#007aff" },
                { texto: "MAPA", url: "https://www.google.com/maps/place/Hotel+Giglio+Rimini/@44.0305256,12.6205751,17z/data=!4m10!3m9!1s0x132cdd2cdff65e15:0xae66ff3ab3780598!5m3!1s2026-05-28!4m1!1i2!8m2!3d44.0305256!4d12.62315!16s%2Fg%2F1thrg5bt?entry=ttu&g_ep=EgoyMDI2MDUyMC4wIKXMDSoASAFQAw%3D%3D", color: "#27ae60" }
            ]}
        ],
        Roma: [
            { nombre: "Casa Per Ferie Santa Lucia", direccion: "Largo di Santa Lucia Filippini, 20, 00186 Roma", botones: [
                { texto: "RESERVA", url: "h_roma.jpg", color: "#007aff" },
                { texto: "MAPA", url: "https://www.google.com/maps/place/Santa+Lucia+Filippini+Casa+per+ferie/@41.8951275,12.4755026,17z/data=!3m1!4b1!4m10!3m9!1s0x132f604c18be2331:0x8738bebdaaf2371c!5m3!1s2026-05-28!4m1!1i2!8m2!3d41.8951275!4d12.4780775!16s%2Fg%2F1vwgy64g?entry=ttu&g_ep=EgoyMDI2MDUyMC4wIKXMDSoASAFQAw%3D%3D", color: "#27ae60" }
            ]}
        ]
    };

    function filtrar(ciudad) {
        document.querySelectorAll('.btn-ciudad').forEach(btn => btn.classList.remove('seleccionado'));
        document.getElementById('btn-' + ciudad).classList.add('seleccionado');
        const contenedor = document.getElementById('info-alojamientos');
        contenedor.innerHTML = "";
        datosAlojamientos[ciudad].forEach(a => {
            let botonesHTML = a.botones.map(b => `<a href="${b.url}" target="_blank" class="btn-accion" style="background:${b.color}">${b.texto}</a>`).join('');
            contenedor.innerHTML += `<div class="tarjeta"><div class="info-alo">${a.nombre}</div><div class="detalles">📍 ${a.direccion}</div><div class="acciones">${botonesHTML}</div></div>`;
        });
    }
</script>
</body>
</html>
