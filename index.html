<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viaje Italia 2026</title>
    <style>
        :root { 
            --bg: #f2f2f7; --card: #ffffff; --accent: #007aff; 
            --accent-dark: #005ecb; --text: #1c1c1e; --gray: #8e8e93; 
            --green: #34c759; --green-dark: #248a3d; --orange: #ff9500;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        
        #bloqueo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .input-pass { padding: 15px; font-size: 1.2rem; border-radius: 12px; border: 1px solid #ccc; width: 100%; max-width: 200px; text-align: center; margin-bottom: 10px; letter-spacing: 5px; }
        .btn-pass { background: var(--accent); color: white; border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; width: 100%; max-width: 200px; }
        
        #contenido-real { display: none; }
        .container { width: 100%; max-width: 450px; margin: 0 auto; }
        .main-header { text-align: center; margin-bottom: 15px; }
        .main-header h1 { font-size: 1.3rem; font-weight: 900; }

        .countdowns-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .countdown-box { color: white; border-radius: 18px; padding: 12px 8px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.08); display: flex; flex-direction: column; gap: 2px; }
        .cb-arturo { background: linear-gradient(135deg, #0052D4, #4364F7, #6FB1FC); }
        .cb-grupo { background: linear-gradient(135deg, #FF512F, #F09819); }
        .timer-val { font-size: 0.85rem; font-weight: 900; margin-top: 5px; font-variant-numeric: tabular-nums; }

        .section { background: var(--card); border-radius: 24px; padding: 18px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .tipo-nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
        .btn-tipo { background: #f2f2f7; border: none; border-radius: 14px; padding: 12px 4px; font-weight: 700; font-size: 0.65rem; color: var(--text); }
        .btn-tipo.active { background: var(--text); color: white; }
        .btn-full { grid-column: span 3; margin-top: 4px; }

        #sub-nav { display: none; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0; padding: 6px; background: #f2f2f7; border-radius: 16px; }
        #sub-nav.cuatro-col { grid-template-columns: repeat(4, 1fr); }
        .btn-sub { background: white; border: none; border-radius: 12px; padding: 10px; font-size: 0.62rem; font-weight: 800; color: var(--gray); }
        .btn-sub.active-pasajero { background: var(--accent); color: white; }
        .btn-sub.active-ciudad { background: var(--orange); color: white; }
        
        .card { background: #fff; border: 1px solid #f2f2f7; border-radius: 20px; padding: 18px; margin-bottom: 14px; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .t-info { font-size: 0.72rem; color: var(--gray); font-weight: 600; }
        .t-matricula { font-size: 0.65rem; color: var(--accent); font-weight: 800; text-transform: uppercase; }
        .t-title { font-weight: 800; font-size: 1.1rem; margin-bottom: 8px; display: block; }
        .t-detalles { font-size: 0.85rem; color: #636366; margin-bottom: 8px; line-height: 1.4; }
        .t-tel { font-size: 0.75rem; color: var(--accent); font-weight: 700; margin-bottom: 16px; display: block; text-decoration: none; }

        .hotel-center .t-title, .hotel-center .t-detalles, .hotel-center .t-tel { text-align: center; width: 100%; display: block; }

        .acciones { display: flex; gap: 6px; width: 100%; align-items: center; margin-top: 10px; }
        .btn-action { border-radius: 12px; text-align: center; text-decoration: none; font-size: 0.62rem; font-weight: 800; color: white; display: flex; align-items: center; justify-content: center; gap: 4px; padding: 10px 2px; flex: 1; min-width: 0; }
        .btn-blue { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); }
        .btn-green { background: linear-gradient(135deg, var(--green), var(--green-dark)); }
        
        .acciones.dual .btn-blue { flex: 2; font-size: 0.75rem; }
    </style>
</head>

            </div>

                document.getElementById('bloqueo').style.display = 'none';
                document.getElementById('contenido-real').style.display = 'block';

                setInterval(updateCountdowns, 1000);

        function updateCountdowns() {
            const now = new Date().getTime();
            const dateArt = new Date('2026-06-30T20:30:00').getTime();
            const datePD = new Date('2026-07-04T05:55:00').getTime();
            const calc = (target) => {
                const gap = target - now;
                if (gap <= 0) return "¡VIAJANDO!";
                const d = Math.floor(gap / (1000 * 60 * 60 * 24));
                const h = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((gap % (1000 * 60)) / 1000);
                return `${d}d ${h}h ${m}m ${s}s`;
            };
            document.getElementById('timer-arturo').innerText = calc(dateArt);
            document.getElementById('timer-pablo-daniel').innerText = calc(datePD);

        function selTipo(m) {
            document.querySelectorAll('.btn-tipo').forEach(b => b.classList.remove('active'));
            document.getElementById('bt-'+m).classList.add('active');
            const sub = document.getElementById('sub-nav');
            sub.style.display = 'grid'; document.getElementById('lista').innerHTML = '';
            if(m==='hoteles'){
                sub.classList.add('cuatro-col');
                sub.innerHTML = `<button class="btn-sub" onclick="renH(this,'verona')">Verona</button><button class="btn-sub" onclick="renH(this,'florencia')">Florencia</button><button class="btn-sub" onclick="renH(this,'rimini')">Rímini</button><button class="btn-sub" onclick="renH(this,'roma')">Roma</button>`;
            } else {
                sub.classList.remove('cuatro-col');
                sub.innerHTML = `<button class="btn-sub" onclick="renP(this,'${m}','arturo')">Arturo</button><button class="btn-sub" onclick="renP(this,'${m}','pablo')">Pablo</button><button class="btn-sub" onclick="renP(this,'${m}','daniel')">Daniel</button>`;
            }
        }

        function renH(btn, c){ clearSub(); btn.classList.add('active-ciudad'); render(db.hoteles[c], true); }
        function renP(btn, t, p){ clearSub(); btn.classList.add('active-pasajero'); render(db[t][p], false); }
        function clearSub() { document.querySelectorAll('.btn-sub').forEach(b => b.classList.remove('active-pasajero','active-ciudad')); }

        function render(data, isH) {
            let h = '';
            data.forEach(i => {
                let btnImgs = '';
                const totalBtns = i.img.length + 1;
                i.img.forEach((img, idx) => {
                    const label = i.img.length > 1 ? 'DOC '+(idx+1) : 'BILLETE';
                    btnImgs += `<a href="${img}" target="_blank" class="btn-action btn-blue"><span>🎫</span> ${label}</a>`;
                });
                const classAcciones = totalBtns === 2 ? 'acciones dual' : 'acciones';

                h += `<div class="card ${isH ? 'hotel-center' : ''}">
                    <div class="card-header"><span class="t-info">🗓️ ${i.f} • ⏰ ${i.h}</span><span class="t-matricula">${i.comp}</span></div>
                    <strong class="t-title">${isH ? '🏨 ' : ''}${i.t}</strong>
                    ${i.d ? `<div class="t-detalles">${i.d}</div>` : ''}
                    ${isH ? `<a href="tel:${i.tel}" class="t-tel">📞 ${i.tel}</a>` : ''}
                    <div class="${classAcciones}">${btnImgs}<a href="https://www.google.com/maps/search/?api=1&query=${i.m}" target="_blank" class="btn-action btn-green"><span>📍</span> MAPA</a></div>
                </div>`;
            });
            document.getElementById('lista').innerHTML = h;
        }
