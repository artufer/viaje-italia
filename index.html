
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Italia 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }
        .section-title {
            font-size: 0.9rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .grid-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        .tab-button {
            background-color: #fff;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
        }
        
        /* ESTILO PARA EL BOTÓN SELECCIONADO */
        .tab-button.active {
            background-color: #007bff !important;
            color: white !important;
            border-color: #0056b3 !important;
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(0,123,255,0.3);
        }

        .content-section {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card {
            background: #fff;
            border: 1px solid #f0f0f0;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .card-header {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 5px;
        }
        .card-title {
            font-weight: 600;
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>IT 🇮🇹 Italia 2026 🇮🇹 IT</h1>

    <div class="section-title">Transportes</div>
    <div class="grid-buttons">
        <button id="btn-ida" class="tab-button" onclick="showSection('ida'); highlightButton('btn-ida')">🛫 Ida</button>
        <button id="btn-vuelta" class="tab-button" onclick="showSection('vuelta'); highlightButton('btn-vuelta')">🛫 Vuelta</button>
        <button id="btn-trenes" class="tab-button" onclick="showSection('trenes'); highlightButton('btn-trenes')">🚆 Trenes</button>
        <button id="btn-buses" class="tab-button" onclick="showSection('buses'); highlightButton('btn-buses')">🚌 Buses</button>
    </div>

    <div id="ida" class="content-section">
        <div class="card">
            <div class="card-header">30/06 - Arturo</div>
            <div class="card-title">León ➔ Valladolid</div>
        </div>
        <div class="card">
            <div class="card-header">01/07 - Arturo</div>
            <div class="card-title">Vall. ➔ Barajas</div>
        </div>
        <div class="card">
            <div class="card-header">03/07 - Pablo / Daniel</div>
            <div class="card-title">León ➔ Valladolid</div>
        </div>
    </div>

    <div id="vuelta" class="content-section">
        <div class="card">
            <div class="card-title">Vuelos de regreso (Info aquí)</div>
        </div>
    </div>

    <div id="trenes" class="content-section">
        <div class="card">
            <div class="card-title">Billetes de Tren Italia (Trenitalia/Italo)</div>
        </div>
    </div>

    <div id="buses" class="content-section">
        <div class="card">
            <div class="card-title">Horarios de Autobuses</div>
        </div>
    </div>

</div>

<script>
    function showSection(sectionId) {
        // Ocultar todas las secciones
        const sections = document.querySelectorAll('.content-section');
        sections.forEach(s => s.style.display = 'none');
        
        // Mostrar la seleccionada
        document.getElementById(sectionId).style.display = 'block';
    }

    function highlightButton(buttonId) {
        // Quitar clase active de todos los botones
        const buttons = document.querySelectorAll('.tab-button');
        buttons.forEach(btn => btn.classList.remove('active'));

        // Añadir clase active al pulsado
        document.getElementById(buttonId).classList.add('active');
    }

    // Mostrar "Ida" por defecto al cargar
    window.onload = () => {
        showSection('ida');
        highlightButton('btn-ida');
    };
</script>

</body>
</html>
