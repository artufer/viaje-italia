<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viaje Italia 2026 - Clima Estable</title>
    <style>
        :root { 
            --bg: #f2f2f7; --card: #ffffff; --accent: #007aff; 
            --accent-dark: #005ecb; --text: #1c1c1e; --gray: #8e8e93; 
            --green: #34c759; --green-dark: #248a3d; --orange: #ff9500;
            --red: #ff3b30;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        
        /* BLOQUEO */
        #bloqueo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .inputs-container { display: flex; gap: 10px; margin-bottom: 10px; width: 100%; max-width: 280px; }
        .input-pass { padding: 15px; font-size: 1.4rem; border-radius: 12px; border: 2px solid #d1d1d6; width: 50%; text-align: center; letter-spacing: 4px; background: white; color: var(--text); }
        .input-pass.active { border-color: var(--accent); background: #f0f7ff; outline: none; }
        #error-msg { color: var(--red); font-size: 0.8rem; font-weight: 700; height: 20px; margin-bottom: 15px; visibility: hidden; text-transform: uppercase; }

        /* TECLADO */
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 260px; margin-bottom: 25px; }
        .btn-num { background: white; border: none; border-radius: 15px; padding: 18px 0; font-size: 1.5rem; font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.08); color: var(--text); cursor: pointer; transition: background 0.1s; }
        .btn-num:active { background: #d1d1d6 !important; transform: scale(0.96); }
        .btn-del { grid-column: 3; background: var(--red); color: white; font-size: 1.2rem; }
        .btn-pass { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 800; font-size: 1rem; width: 100%; max-width: 260px; box-shadow: 0 4px 12px rgba(0,122,255,0.3); }
        
        /* CONTENIDO PRINCIPAL */
        #contenido-real { display: none; }
        .container { width: 100%; max-width: 450px; margin: 0 auto; }
        .main-header { text-align: center; margin-bottom: 15px; }
        .main-header h1 { font-size: 1.3rem; font-weight: 900; margin-bottom: 5px; }
        
        /* CONTENEDOR TEMPERATURAS (Antiespionaje AdBlock) */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 15px; padding: 0 10px; }
        .btn-info-meteo { font-size: 0.72rem; color: #636366; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 4px; background: rgba(255,255,255,0.6); padding: 5px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.03); min-height: 28px; cursor: pointer; }
        .btn-info-meteo:active { background-color: rgba(230,230,235,0.8); }

        .countdowns-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .countdown-box { color: white; border-radius: 18px; padding: 12px 8px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.08); display: flex; flex-direction: column; gap: 2px; }
        .cb-arturo { background: linear-gradient(135deg, #0052D4, #4364F7, #6FB1FC); }
        .cb-grupo { background: linear-gradient(135deg, #FF512F, #F09819); }
        .timer-val { font-size: 0.85rem; font-weight: 900; margin-top: 5px; font-variant-numeric: tabular-nums; }
        
        /* SECCIONES */
        .section { background: var(--card); border-radius: 24px; padding: 18px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .tipo-nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
        .btn-tipo { background: #f2f2f7; border: none; border-radius: 14px; padding: 12px 4px; font-weight: 700; font-size: 0.65rem; color: var(--text); }
        .btn-tipo.active { background: var(--text); color: white; }
        .btn-full { grid-column: span 3; margin-top: 4px; }
        #sub-nav { display: none; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0; padding: 6px; background: #f2f2f7; border-radius: 16px; }
        #sub-nav.cuatro-col { grid-template-columns: repeat(4, 1fr); }
        .btn-sub { background: white; border: none; border-radius: 12px; padding: 10px; font-size: 0.62rem; font-weight: 800; color: var(--gray); }
        .btn-sub.active-pasajero { background: var(--accent); color: white; }
        .btn-sub.active-ciudad { background: var(--orange); color: white; }
        .card { background: #fff; border: 1px solid #f2f2f7; border-radius: 20px; padding: 18px; margin-bottom: 14px; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .t-info { font-size: 0.72rem; color: var(--gray); font-weight: 600; }
        .t-matricula { font-size: 0.65rem; color: var(--accent); font-weight: 800; text-transform: uppercase; }
        .t-title { font-weight: 800; font-size: 1.1rem; margin-bottom: 8px; display: block; }
        .t-detalles { font-size: 0.85rem; color: #636366; margin-bottom: 8px; line-height: 1.4; }
        .t-tel { font-size: 0.75rem; color: var(--accent); font-weight: 700; margin-bottom: 16px; display: block; text-decoration: none; }
        
        /* Modificadores exclusivos para centrar campos de hoteles */
        .txt-center { text-align: center; }

        .acciones { display: flex; gap: 6px; width: 100%; align-items: center; margin-top: 10px; flex-wrap: wrap; }
        .btn-action { border-radius: 12px; text-align: center; text-decoration: none; font-size: 0.62rem; font-weight: 800; color: white; display: flex; align-items: center; justify-content: center; gap: 4px; padding: 10px 2px; flex: 1; min-width: 80px; }
        .btn-blue { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); }
        .btn-green { background: linear-gradient(135deg, var(--green), var(--green-dark)); }
    </style>
</head>

        let currentActive = 1;
        function setActive(n) {
            currentActive = n;
            document.getElementById('pass1_v').classList.toggle('active', n === 1);
            document.getElementById('pass2_v').classList.toggle('active', n === 2);
            hideError();
        }
        function addChar(val) {
            hideError();
            const real = document.getElementById('pass' + currentActive + '_real');
            const visual = document.getElementById('pass' + currentActive + '_v');
            if(real.value.length < 4) {
                real.value += val;
                let dots = ""; for(let i=0; i < real.value.length - 1; i++) dots += "●";
                visual.value = dots + val;
                setTimeout(() => {
                    let hidden = ""; for(let i=0; i < real.value.length; i++) hidden += "●";
                    visual.value = hidden;
                }, 400);
                if(real.value.length === 4 && currentActive === 1) setActive(2);
            }
        }
        function delChar() {
            hideError();
            const real = document.getElementById('pass' + currentActive + '_real');
            const visual = document.getElementById('pass' + currentActive + '_v');
            if(real.value.length === 0 && currentActive === 2) { setActive(1); return; }
            real.value = real.value.slice(0, -1);
            let hidden = ""; for(let i=0; i < real.value.length; i++) hidden += "●";
            visual.value = hidden;
        }
        function showError() { document.getElementById('error-msg').style.visibility = 'visible'; }
        function hideError() { document.getElementById('error-msg').style.visibility = 'hidden'; }

                {id: 'i-rm', name: 'Roma', baseTemp: 31},
                {id: 'i-rmn', name: 'Rímini', baseTemp: 28}
            ];
            listado.forEach(c => {
                const delta = Math.floor(Math.random() * 3) - 1;
                const tempFinal = c.baseTemp + delta;
                const target = document.getElementById(c.id);
                if (target) {
                    target.innerText = `${c.name}: ☀️ ${tempFinal}°C`;
                }
            });
        }

        function verPrevision(ciudad) {
            window.open(`https://www.weather-forecast.com/locations/${ciudad}/forecasts/latest`, '_blank');
        }

        function updateCountdowns() {
            const now = new Date().getTime();
            const dateArt = new Date('2026-06-30T20:30:00').getTime();
            const datePD = new Date('2026-07-04T05:55:00').getTime();
            const calc = (t) => {
                const gap = t - now;
                if (gap <= 0) return "¡VIAJANDO!";
                const d = Math.floor(gap / 86400000);
                const h = Math.floor((gap % 86400000) / 3600000);
                const m = Math.floor((gap % 3600000) / 60000);
                const s = Math.floor((gap % 60000) / 1000);
                return `${d}d ${h}h ${m}m ${s}s`;
            };
            document.getElementById('timer-arturo').innerText = calc(dateArt);
            document.getElementById('timer-pablo-daniel').innerText = calc(datePD);
        }

        function selTipo(m) {
            document.querySelectorAll('.btn-tipo').forEach(b => b.classList.remove('active'));
            document.getElementById('bt-'+m).classList.add('active');
            const sub = document.getElementById('sub-nav');
            sub.style.display = 'grid'; document.getElementById('lista').innerHTML = '';
            if(m==='hoteles'){
                sub.classList.add('cuatro-col');
                sub.innerHTML = `<button class="btn-sub" onclick="renH(this,'verona')">Verona</button><button class="btn-sub" onclick="renH(this,'florencia')">Florencia</button><button class="btn-sub" onclick="renH(this,'rimini')">Rímini</button><button class="btn-sub" onclick="renH(this,'roma')">Roma</button>`;
            } else {
                sub.classList.remove('cuatro-col');
                sub.innerHTML = `<button class="btn-sub" onclick="renP(this,'${m}','arturo')">Arturo</button><button class="btn-sub" onclick="renP(this,'${m}','pablo')">Pablo</button><button class="btn-sub" onclick="renP(this,'${m}','daniel')">Daniel</button>`;
            }
        }

        function renH(btn, c){ clearSub(); btn.classList.add('active-ciudad'); render(db.hoteles[c] || [], true, c); }
        function renP(btn, t, p){ clearSub(); btn.classList.add('active-pasajero'); render(db[t][p] || [], false); }
        function clearSub() { document.querySelectorAll('.btn-sub').forEach(b => b.classList.remove('active-pasajero','active-ciudad')); }

        function render(data, isH, ciudad) {
            let h = '';
            data.forEach(i => {
                let btns = '';
                i.img.forEach((img, idx) => {
                    let label = isH ? (ciudad === 'rimini' && idx === 1 ? 'RECIBO' : 'RESERVA') : 'BILLETE';
                    if(isH && ciudad === 'florencia' && i.t.includes('Archi Rossi')) {
                        const labs = ['RESERVA', 'HABITACIÓN', 'RECIBO'];
                        label = labs[idx] || 'DOCUMENTO';
                    }
                    btns += `<a href="${img}" target="_blank" class="btn-action btn-blue">🎫 ${label}</a>`;
                });
                
                let centerClass = isH ? 'txt-center' : '';

                h += `<div class="card">
                    <div class="card-header"><span class="t-info">🗓️ ${i.f} • ⏰ ${i.h}</span><span class="t-matricula">${i.comp}</span></div>
                    <strong class="t-title ${centerClass}">${i.t}</strong>
                    ${i.d ? `<div class="t-detalles ${centerClass}">${i.d}</div>` : ''}
                    ${isH ? `<a href="tel:${i.tel}" class="t-tel ${centerClass}">📞 ${i.tel}</a>` : ''}
                    <div class="acciones">${btns}<a href="https://maps.google.com/?q=${i.m}" target="_blank" class="btn-action btn-green">📍 MAPA</a></div>
                </div>`;
            });
            document.getElementById('lista').innerHTML = h;
        }
    </script>
</body>
</html>
