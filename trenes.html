        document.querySelectorAll('.btn').forEach(b => b.classList.remove('seleccionado'));
        document.getElementById('btn-' + usuario).classList.add('seleccionado');
        const contenedor = document.getElementById('info-trenes');
        contenedor.innerHTML = "";
        
        datosTrenes[usuario].forEach(v => {
            let esMarconi = v.info === "MARCONI EXPRESS";
            let htmlAcciones = esMarconi 
                ? `<a href="${v.mapa}" target="_blank" class="btn-accion" style="background:#27ae60; width:100%; display:block; margin-bottom:8px;">AEROPUERTO - MARCONI EXPRESS</a>
                   <a href="${v.mapa2}" target="_blank" class="btn-accion" style="background:#27ae60; width:100%; display:block;">MARCONI EXPRESS - BOLONIA CENTRALE</a>`
                : `<a href="${v.billete}" target="_blank" class="btn-accion" style="background:#007aff; flex:1;">🎫 BILLETE</a>
                   <a href="${v.mapa}" target="_blank" class="btn-accion" style="background:#27ae60; flex:1;">📍 MAPA</a>`;

            contenedor.innerHTML += `
                <div class="tarjeta">
                    <div class="info-tren"><span>🗓️ ${v.fecha}</span> <span>⏰ ${v.hora}</span></div>
                    <div style="font-weight:bold; color:#2980b9">${v.info}</div>
                    <div class="ruta">${v.ruta}</div>
                    <div style="font-size:0.85rem; margin-bottom:10px;">${v.lugar}</div>
                    <div class="acciones" style="flex-direction: column;">${htmlAcciones}</div>
                </div>
            `;
        });
