<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Ajuste fundamental para móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vacaciones Italia 2026</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f9; display: flex; justify-content: center; padding: 10px; margin: 0; }
        .main-container { background: #fff; padding: 15px; border-radius: 20px; width: 100%; max-width: 450px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; font-weight: bold; font-size: 1.4rem; margin-bottom: 15px; }
        
        .btn-container { background: #ffffff; padding: 10px; border-radius: 15px; border: 1px solid #f0f0f0; margin-bottom: 15px; }
        .temp-title { font-weight: bold; font-size: 0.8rem; margin: 8px 0; color: #777; text-align: center; }
        .temp-grid { display: grid; gap: 8px; margin-bottom: 10px; }
        .row-3 { grid-template-columns: repeat(3, 1fr); }
        .row-4 { grid-template-columns: repeat(4, 1fr); }
        .temp-box { background: #f9f9f9; padding: 8px; border-radius: 8px; text-align: center; font-size: 0.75rem; border: 1px solid #eee; }
        
        .countdown-section { background: #f9f9f9; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #eee; text-align: center; font-size: 0.9rem; }
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
        .nav-container { background: #f8f9fa; padding: 10px; border-radius: 15px; margin-top: 5px; }
        .btn-grid-nav { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        
        .btn { padding: 10px 5px; border-radius: 8px; color: white; font-weight: bold; font-size: 0.6rem; text-align: center; border: none; cursor: pointer; text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .sos-btn { width: 100%; padding: 15px; background: #e63946; color: white; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; margin: 10px 0; }
        
        .modal { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 92%; max-width: 400px; max-height: 85vh; overflow-y: auto; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; cursor: pointer; font-size: 1.8rem; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">🇮🇹 Vacaciones Italia 2026</div>

    <div class="btn-container">
        <div class="temp-title">ESPAÑA</div>
        <div class="temp-grid row-3">
            <div class="temp-box">León<br>☀️19°C</div>
            <div class="temp-box">Vallad.<br>☀️17°C</div>
            <div class="temp-box">Madrid<br>🌤️19°C</div>
        </div>
        <div class="temp-title">ITALIA</div>
        <div class="temp-grid row-4">
            <div class="temp-box">Verona<br>🌤️25°C</div>
            <div class="temp-box">Flor.<br>☀️23°C</div>
            <div class="temp-box">Roma<br>🌤️22°C</div>
            <div class="temp-box">Rímini<br>🌤️25°C</div>
        </div>
    </div>

    <div class="countdown-section">
        <b>TIEMPO RESTANTE:</b>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top:8px;">
            <div style="text-align: left;">Arturo:<br><b id="count-arturo">--</b></div>
            <div style="font-size: 1.5rem;">🏖️</div>
            <div style="text-align: right;">Pablo/Dani:<br><b id="count-otros">--</b></div>
        </div>
    </div>

    <div class="btn-grid">
        <a href="https://www.skylinewebcams.com/es/webcam/italia/emilia-romagna/rimini/miramare-di-rimini.html" target="_blank" class="btn" style="background:#5c56d0;">CÁMARA</a>
        <a href="https://music.amazon.es/" target="_blank" class="btn" style="background:#f39c12;">MÚSICA</a>
        <button class="btn" style="background:#27ae60;" onclick="document.getElementById('modal-maleta').style.display='flex'">MALETA</button>
        <button class="btn" style="background:#007aff;" onclick="document.getElementById('modal-frases').style.display='flex'">FRASES</button>
    </div>
    
    <button class="sos-btn">☎️ TELÉFONOS SOS</button>

    <div class="nav-container">
        <div class="btn-grid-nav">
            <a href="autobuses.html" class="btn" style="background:#e84393;">BUS</a>
            <a href="aviones.html" class="btn" style="background:#0984e3;">AVIÓN</a>
            <a href="trenes.html" class="btn" style="background:#6c5ce7;">TREN</a>
            <a href="alojamientos.html" class="btn" style="background:#00b894;">HOTEL</a>
            <a href="entradas.html" class="btn" style="background:#fdcb6e; color:#333;">TICKET</a>
        </div>
    </div>
</div>

<!-- (El resto del contenido HTML, modales y script permanecen igual) -->
<!-- ... -->
</body>
</html>
