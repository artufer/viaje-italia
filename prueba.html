<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reloj Espectacular</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #111; 
        }
        .reloj-espectacular { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 4rem; 
            color: #00d4ff; 
            text-shadow: 0 0 20px #00d4ff, 0 0 40px #00d4ff; 
            background: #000; 
            padding: 30px; 
            border-radius: 20px; 
            border: 2px solid #00d4ff;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

    <div id="reloj-digital" class="reloj-espectacular">00:00:00</div>

    <script>
        function actualizarReloj() {
            const ahora = new Date();
            document.getElementById('reloj-digital').innerText = ahora.toLocaleTimeString('es-ES', { hour12: false });
        }
        setInterval(actualizarReloj, 1000);
        actualizarReloj();
    </script>
</body>
</html>
